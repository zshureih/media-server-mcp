name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "@wyattjoh/media-server-mcp@v*"
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
      - "deno.json"
      - "deno.lock"
      - "packages/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/media-server-mcp
          # Force git-derived context instead of the default `workflow`
          # context. On this fork, `workflow` context intermittently 503s
          # while resolving ref/context via GitHub's API — reproduced twice
          # in a row (2026-07-16) as a raw "Unicorn" 503 HTML page from this
          # step specifically, while every other API surface for this repo
          # responded normally at the same time. `git` context resolves
          # ref/sha from the local checkout instead, sidestepping that API
          # call entirely regardless of its root cause.
          context: git
          # The release-please tag for the MCP package is
          # `@wyattjoh/media-server-mcp@vX.Y.Z`. Strip the package prefix so
          # the resulting Docker tag is the bare semver (vX.Y.Z, X.Y, etc.).
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=match,pattern=@wyattjoh/media-server-mcp@v(\d+\.\d+\.\d+),group=1
            type=match,pattern=@wyattjoh/media-server-mcp@v(\d+\.\d+),group=1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
